<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoStream | Premium Movie Platform</title>
    <style>
        :root {
            --bg-color: #050508;
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }

        /* Latar Belakang Gradient Mesh */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(157, 0, 255, 0.05), transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(0, 243, 255, 0.05), transparent 30%);
            z-index: -1;
            pointer-events: none;
        }
        
        /* Typography & Utility */
        h1, h2, h3 { color: #fff; }
        .neon-text { text-shadow: 0 0 15px rgba(0, 243, 255, 0.5), 0 0 30px rgba(157, 0, 255, 0.4); }
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
        }
        
        /* Navbar */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid var(--glass-border); 
            background: rgba(5, 5, 8, 0.7); backdrop-filter: blur(12px); 
        }
        nav h1 { font-size: 26px; font-weight: 900; letter-spacing: 2px; cursor: pointer; }
        .search-box { display: flex; gap: 12px; }
        .search-box input { 
            padding: 12px 18px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; 
            outline: none; width: 280px; transition: 0.3s;
        }
        .search-box input:focus { 
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); 
        }
        .btn-neon { 
            background: linear-gradient(135deg, var(--neon-purple), #5e0099); 
            border: 1px solid var(--neon-purple); color: white; 
            padding: 10px 24px; border-radius: 10px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-neon:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(157, 0, 255, 0.4); 
            background: linear-gradient(135deg, #b033ff, var(--neon-purple)); 
        }

        /* Container & Cards */
        .container { padding: 50px 5%; }
        .section-title { margin-bottom: 30px; font-size: 28px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 30px; 
        }
        .card { 
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden; position: relative; 
        }
        .card img { 
            width: 100%; height: 320px; object-fit: cover; 
            border-radius: 16px 16px 0 0; transition: 0.5s;
        }
        .card-info { padding: 20px; }
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 15px 30px rgba(0, 243, 255, 0.15); 
            border-color: rgba(0, 243, 255, 0.4); 
        }
        .card:hover img { transform: scale(1.05); filter: brightness(1.1); }
        
        /* Scroll Reveal Animation */
        .reveal { 
            opacity: 0; transform: translateY(60px); 
            transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); 
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* Modal Detail */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
            justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
        }
        .modal.show { opacity: 1; }
        .modal-content { 
            width: 90%; max-width: 1000px; max-height: 85vh; overflow-y: auto; 
            padding: 40px; position: relative; border-radius: 24px;
        }
        /* Custom Scrollbar for Modal */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }

        .close-btn { 
            position: absolute; right: 25px; top: 25px; font-size: 28px; 
            cursor: pointer; color: #fff; transition: 0.3s; 
            background: rgba(255,255,255,0.1); width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center; border-radius: 50%;
        }
        .close-btn:hover { background: var(--neon-purple); transform: rotate(90deg); }
        
        .detail-header { display: flex; gap: 40px; margin-bottom: 40px; flex-wrap: wrap; }
        .detail-header img { 
            width: 280px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(157, 0, 255, 0.3); 
        }
        .detail-info { flex: 1; min-width: 300px; }
        .badge { 
            display: inline-block; padding: 5px 12px; background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan); border-radius: 20px; font-size: 14px; border: 1px solid var(--neon-cyan);
            margin-bottom: 15px; margin-right: 10px;
        }
        
        /* Player & Episodes */
        .player-container { 
            margin-top: 30px; width: 100%; border-radius: 16px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,243,255,0.2); display: none; 
            border: 1px solid rgba(0,243,255,0.3);
        }
        video { width: 100%; display: block; outline: none; background: #000; }
        
        .episode-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 15px; margin-top: 20px; margin-bottom: 30px;
        }
        .ep-btn { 
            padding: 12px; text-align: center; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; 
            cursor: pointer; transition: 0.3s; color: white; font-weight: 600;
        }
        .ep-btn:hover, .ep-btn.active { 
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan)); 
            border-color: transparent; box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3); transform: translateY(-2px);
        }
        
        /* Loading */
        #loader { 
            text-align: center; margin: 60px 0; color: var(--neon-cyan); 
            display: none; font-size: 1.2rem; letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-cyan); }
            100% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 20px; }
            .search-box input { width: 100%; }
            .detail-header { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <h1 class="neon-text" onclick="loadTrending()">NeoStream</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari film, anime, atau series..." onkeypress="if(event.key === 'Enter') searchMovies()">
            <button class="btn-neon" onclick="searchMovies()">Search</button>
        </div>
